<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="Traycee - Personal Safety and Emergency Response App" />
    <meta name="keywords" content="safety, emergency, tracking, guardian, map, security" />
    <meta name="author" content="Traycee" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Traycee - Safety App" />
    <meta property="og:description" content="Your personal safety companion for emergency response and location tracking" />
    <meta property="og:type" content="website" />
    
    <!-- PWA Configuration -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Traycee">
    
    <!-- Disable telephone detection -->
    <meta name="format-detection" content="telephone=no">
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:3000;" />
    
    <title>Traycee - Personal Safety App</title>
    
    <style>
      /* Critical CSS for initial loading */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f9fafb;
      }
      
      /* Loading screen styles */
      #loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }
      
      .loading-content {
        text-align: center;
      }
      
      .loading-spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #3498db;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Hide the app until it's loaded */
      #root {
        opacity: 0;
        transition: opacity 0.3s ease-in;
      }
      
      #root.loaded {
        opacity: 1;
      }
      
      /* Ensure proper focus styles for accessibility */
      button:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 3px solid #3b82f6;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>You need to enable JavaScript to run Traycee safety application.</p>
        <p>This application requires JavaScript for real-time safety features and emergency functionality.</p>
      </div>
    </noscript>
    
    <!-- Loading screen -->
    <div id="loading">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <h2>Traycee</h2>
        <p>Loading your safety companion...</p>
      </div>
    </div>
    
    <!-- React app root -->
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Handle loading state
      window.addEventListener('load', function() {
        // Hide loading screen when React app is ready
        setTimeout(function() {
          const loading = document.getElementById('loading');
          const root = document.getElementById('root');
          
          if (loading) {
            loading.style.display = 'none';
          }
          if (root) {
            root.classList.add('loaded');
          }
        }, 1000);
      });
      
      // Error handling for the app
      window.addEventListener('error', function(e) {
        console.error('Application error:', e.error);
      });
      
      // Geolocation availability check
      if (!navigator.geolocation) {
        console.warn('Geolocation is not supported by this browser');
      }
      
      // Service Worker Registration for PWA (optional)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('SW registered: ', registration);
            })
            .catch(function(registrationError) {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
